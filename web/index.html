<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Raaj Mathan Kumar — Senior Flutter Developer Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raaj Mathan Kumar — Senior Flutter Developer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background-color: #04040f; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #04040f; color: #32D6FE;
      font-family: monospace; font-size: 14px; letter-spacing: 0.1em;
    }
    .loader-ring {
      width: 60px; height: 60px; border-radius: 50%; margin-bottom: 24px;
      border: 3px solid transparent;
      border-top-color: #007AFF; border-right-color: #BF5AF2;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
    LOADING PORTFOLIO...
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <base href="/raajmathankumar.github.io/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Raaj Mathan Kumar — Senior Flutter Developer Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raaj Mathan Kumar — Senior Flutter Developer</title>

  <!-- Force no cache on every file -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background-color: #04040f; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; background: #04040f;
      color: #32D6FE; font-family: monospace; font-size: 14px;
      letter-spacing: 0.1em;
    }
    .loader-ring {
      width: 60px; height: 60px; border-radius: 50%; margin-bottom: 24px;
      border: 3px solid transparent;
      border-top-color: #007AFF; border-right-color: #BF5AF2;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="loading">
  <div class="loader-ring"></div>
  LOADING PORTFOLIO...
</div>

<script>
  // ── Kill old service worker immediately ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for (let registration of registrations) {
        registration.unregister();
        console.log('Old service worker unregistered');
      }
    });

    // Also clear all caches
    if ('caches' in window) {
      caches.keys().then(function(cacheNames) {
        cacheNames.forEach(function(cacheName) {
          caches.delete(cacheName);
          console.log('Cache cleared:', cacheName);
        });
      });
    }
  }

  // ── Remove loading screen when Flutter is ready ──
  window.addEventListener('flutter-first-frame', () => {
    document.getElementById('loading').remove();
  });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
